services:
  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=kassa_db
      - POSTGRES_USER=kassa_user
      - POSTGRES_PASSWORD=kassa_secret
    ports:
      - "5437:5437"

  backend:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8087 core.wsgi:application"
    volumes:
      - .:/app
    ports:
      - "8087:8087"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
